<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TCW Topic 1 (43)</title>
<style>
  body {
    font-family: Inter, Arial, sans-serif;
    margin: 0;
    background: #0d0f14;
    color: #e6e6e6;
    display: flex;
    flex-direction: column; 
    align-items: center;
    padding: 40px 15px;
  }
  .container {
    width: 100%;
    max-width: 750px;
    background: #161a23;
    border-radius: 18px;
    padding: 30px 35px;
    box-shadow: 0 0 25px rgba(0,0,0,0.45);
    margin-bottom: 20px; 
  }
  h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #40c9ff;
    font-size: 28px;
    font-weight: 700;
  }
  .jump-box {
    text-align: center;
    margin-bottom: 20px;
  }
  .jump-box input {
    padding: 10px;
    width: 120px;
    border-radius: 10px;
    border: none;
    background: #222836;
    color: #fff;
    text-align: center;
  }
  .jump-box button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #40c9ff;
    color: #0d0f14;
    font-weight: 600;
    cursor: pointer;
    margin-left: 5px;
  }
  .question {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 18px;
    line-height: 1.4;
  }
  .options button {
    display: block;
    width: 100%;
    background: #222836;
    color: #e6e6e6;
    border: none;
    border-radius: 12px;
    padding: 12px;
    margin: 8px 0;
    text-align: left;
    font-size: 16px;
    cursor: pointer;
    transition: 0.25s;
  }
  .options button:hover {
    background: #2b3242;
  }
  .feedback {
    margin-top: 12px;
    font-size: 18px;
    font-weight: 600;
  }
  .correct {
    color: #4dff88;
  }
  .wrong {
    color: #ff5d5d;
  }
  .next-btn {
    margin-top: 20px;
    width: 100%;
    background: #40c9ff;
    color: #0d0f14;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .result {
    text-align: center;
  }
  /* --- FOOTER STYLES --- */
  #footer-reset-bar {
    width: 100%;
    max-width: 750px;
    text-align: center;
    padding: 15px 0;
  }
  #footer-reset-bar button {
    width: 100%;
    background: #272e3d;
    color: #d5d5d5;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
  }
  
  
</style>
</head>
<body>
<div class="container">
  <h1>TCW Topic 1 (43)</h1>

  <div class="jump-box">
    <input id="jumpInput" type="number" min="1" placeholder="Jump to #">
    <button onclick="jumpToQuestion()">Go</button>
  </div>

  <div id="quiz">
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <button id="next-btn" class="next-btn">Next Question</button>
  </div>

  <div id="result" class="result" style="display:none;"></div>
</div>

<div id="footer-reset-bar">
  <button onclick="confirmReset()">🔄 Reset Quiz</button>
</div>
<script>
  const quizData = [

{
  q: "According to Larsson (2001), globalization is described as what?",

  answer: 0
},
{

  options: ["Larsson", "Ohmae", "Cox", "Locke"],
  answer: 1
},
{
  q: "Cox (2000) emphasized globalization as involving which of the following?",
  options: ["Colonial expansion", "Internationalizing of production", "Rise of democracy", "Technological innovation"],
  answer: 1
},
{
  q: "Which of the following is NOT listed as a key theme of globalization?",
  options: ["Integration", "Interdependence", "Isolationism", "Free trade"],
  answer: 2
},
{
  q: "Which merit of globalization helps keep inflation low?",
  options: ["Innovation", "Competition", "Capital flows", "Migration"],
  answer: 1
},
{
  q: "Globalization spurs innovation primarily through what?",
  options: ["Local traditions", "Global ideas", "Government subsidies", "Colonialism"],
  answer: 1
},
{
  q: "Export jobs under globalization often have which characteristic?",
  options: ["Lower pay", "Higher pay", "No benefits", "Seasonal contracts"],
  answer: 1
},
{
  q: "Which merit of globalization involves the free movement of money across borders?",
  options: ["Capital flows freely", "Living standards rise", "Comparative advantage", "Migration"],
  answer: 0
},
{
  q: "Living standards rise faster under globalization due to what factor?",
  options: ["Isolation", "Protectionism", "Integration", "Colonialism"],
  answer: 2
},
{
  q: "Productivity grows under globalization because of which principle?",
  options: ["Comparative advantage", "Absolute advantage", "Protectionism", "Isolationism"],
  answer: 0
},
{
  q: "Which merit of globalization makes migration easier?",
  options: ["Free trade agreements", "Liberalized visa rules", "Colonial expansion", "Reduced tariffs"],
  answer: 1
},
{
  q: "Globalization shifts resources toward which type of sectors?",
  options: ["Unproductive", "Traditional", "Productive", "Agricultural only"],
  answer: 2
},
{
  q: "Which demerit of globalization is linked to outsourcing?",
  options: ["Job losses", "Wage cuts", "Exploitation", "Sovereignty threats"],
  answer: 0
},
{
  q: "Employer pressure under globalization often leads to what?",
  options: ["Wage increases", "Wage cuts", "Job creation", "Higher benefits"],
  answer: 1
},
{
  q: "Exploitation under globalization is most common in which regions?",
  options: ["Developed countries", "Poor/developing countries", "Colonial powers", "Multipolar states"],
  answer: 1
},
{
  q: "Which demerit of globalization threatens the independence of nations?",
  options: ["Job losses", "Sovereignty threats", "Wage cuts", "Migration"],
  answer: 1
},
{
  q: "Regionalization prefers partnerships at which level?",
  options: ["Global", "Regional", "Local", "Individual"],
  answer: 1
},
{
  q: "Which of the following is NOT an example of regionalization?",
  options: ["ASEAN", "EU", "NAFTA", "UN"],
  answer: 3
},
{
  q: "Regionalization is often seen as a counter to what?",
  options: ["Colonialism", "Globalization", "Democracy", "Technology"],
  answer: 1
},
{
  q: "Which wave of globalization occurred between 1860 and 1914?",
  options: ["First wave", "Second wave", "Third wave", "Fourth wave"],
  answer: 0
},
{
  q: "Which technology characterized the first wave of globalization?",
  options: ["Steam engine", "Jet planes", "Microprocessor", "Satellites"],
  answer: 0

{
  q: "Which political leader dominated the first wave of globalization?",
  options: ["USA", "Britain", "China", "EU"],
  answer: 1
},
{
  q: "Commerce in the first wave shifted from free trade to what?",
  options: ["Protectionism", "Reduced tariffs", "Widespread free trade", "Isolationism"],
  answer: 0
},
{
  q: "Capital movement in the first wave was characterized as what?",
  options: ["Regulated", "Free", "Restricted", "Blocked"],
  answer: 1
},
{
  q: "Migration during the first wave was described as what?",
  options: ["Political migration", "Regulated", "Free movement", "Colonial migration"],
  answer: 2
},
{
  q: "Which wave of globalization occurred between 1944 and 1971?",
  options: ["First wave", "Second wave", "Third wave", "Fourth wave"],
  answer: 1
},
{
  q: "Which technology characterized the second wave of globalization?",
  options: ["Telegraph", "Jet planes", "Internet", "Mobile phones"],
  answer: 1
},
{
  q: "Which political leader dominated the second wave of globalization?",
  options: ["Britain", "USA", "China", "EU"],
  answer: 1
},
{
  q: "Commerce in the second wave was marked by what?",
  options: ["Protectionism", "Reduced tariffs", "Free trade", "Isolationism"],

},
{
  q: "Capital movement in the second wave was described as what?",
  options: ["Free", "Regulated", "Blocked", "Restricted"],

{
  q: "Migration during the second wave was described as what?",
  options: ["Free movement", "Regulated", "Political migration", "Colonial migration"],

},
{
  q: "Which wave of globalization began in 1989 and continues today?",
  options: ["First wave", "Second wave", "Third wave", "Fourth wave"],
  answer: 2
},
{
  q: "Which technology characterized the third wave of globalization?",
  options: ["Steam engine", "Satellites", "Microprocessor", "Telegraph"],
  answer: 2
},
{
  q: "Political leadership in the third wave is described as what?",
  options: ["Unipolar", "Colonial", "Multipolar", "Isolationist"],
  answer: 2
},
{
  q: "Commerce in the third wave is marked by what?",
  options: ["Protectionism", "Reduced tariffs", "Widespread free trade", "Isolationism"],
  answer: 2
},
{
  q: "Capital movement in the third wave is described as what?",
  options: ["Regulated", "Free", "Blocked", "Restricted"],
  answer: 1
},
{
  q: "Migration in the third wave is described as what?",
  options: ["Free movement", "Regulated", "Political migration", "Colonial migration"],
  answer: 2
},
{
  q: "Which of the following is a merit of globalization related to comparative advantage?",
  options: ["Job losses", "Productivity growth", "Sovereignty threats", "Exploitation"],
  answer: 1
},
{
  q: "Which of the following is a demerit of globalization related to cheap imports?",
  options: ["Job losses", "Innovation", "Capital flows", "Living standards"],
  answer: 0
},
{
  q: "Which of the following organizations is an example of regionalization?",
  options: ["ASEAN", "UN", "WTO", "IMF"],
  answer: 0
},
{
  q: "Which wave of globalization was associated with colonialism?",
  options: ["First wave", "Second wave", "Third wave", "Fourth wave"],
  answer: 0
},
{
  q: "Which wave of globalization was associated with the Cold War?",
  options: ["First wave", "Second wave", "Third wave", "Fourth wave"],
  answer: 1
},
{
  q: "Which wave of globalization is associated with democratic processes?",
  options: ["First wave", "Second wave", "Third wave", "Fourth wave"],
  answer: 2
}

  ];

  let currentQuestion = 0;
  let score = 0;
  let hasAnsweredCorrectly = new Array(quizData.length).fill(false);

  const questionEl = document.getElementById("question");
  const optionsEl = document.getElementById("options");
  const feedbackEl = document.getElementById("feedback");
  const nextBtn = document.getElementById("next-btn");
  const resultEl = document.getElementById("result");
  
  // *** NEW FUNCTION: Handles the confirmation dialog and reset ***
  function confirmReset() {
    const isConfirmed = confirm("Are you sure you want to reset the quiz? Your current progress will be lost.");
    
    if (isConfirmed) {
      location.reload(); // Hard reset (Yes clicked)
    } 
    // If 'Cancel' or 'No' is clicked, nothing happens.
  }
  // -------------------------------------------------------------

  function showQuestion() {
    const item = quizData[currentQuestion];
    questionEl.textContent = `Q${currentQuestion + 1}. ${item.q}`;
    optionsEl.innerHTML = "";
    feedbackEl.textContent = "";
    nextBtn.style.display = "none";

    item.options.forEach((opt, index) => {
      const btn = document.createElement("button");
      btn.textContent = opt;
      btn.onclick = () => tryAnswer(btn, index);
      optionsEl.appendChild(btn);
      
      if (hasAnsweredCorrectly[currentQuestion]) {
        btn.disabled = true;
      }
    });
    
    if (hasAnsweredCorrectly[currentQuestion]) {
        nextBtn.style.display = "block";
        feedbackEl.textContent = "✅ Correct! (Revisiting)";
        feedbackEl.className = "feedback correct";
    }
  }

  function tryAnswer(btn, selected) {
    const correct = quizData[currentQuestion].answer;

    if (selected === correct) {
      feedbackEl.textContent = "✅ Correct!";
      feedbackEl.className = "feedback correct";

      if (!hasAnsweredCorrectly[currentQuestion]) {
        score++;
        hasAnsweredCorrectly[currentQuestion] = true;
      }

      Array.from(optionsEl.children).forEach(b => b.disabled = true);
      nextBtn.style.display = "block";

    } else {
      btn.disabled = true;
      btn.style.opacity = "0.45";

      feedbackEl.textContent = "❌ Wrong! Try again.";
      feedbackEl.className = "feedback wrong";
    }
  }

  nextBtn.onclick = () => {
    currentQuestion++;
    if (currentQuestion < quizData.length) {
      showQuestion();
    } else {
      showResult();
    }
  };

  function jumpToQuestion() {
    const num = parseInt(document.getElementById("jumpInput").value);
    if (!num || num < 1 || num > quizData.length) {
      alert("Invalid question number.");
      return;
    }
    currentQuestion = num - 1;
    showQuestion();
  }

  function showResult() {
    document.getElementById("quiz").style.display = "none";
    resultEl.style.display = "block";

    resultEl.innerHTML = `
      <h2>Your Score: ${score}/${quizData.length}</h2>
    `;
  }

  showQuestion();
</script>
</body>
</html>
