<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MF Topic 3 (31)</title>
<style>
  body {
    font-family: Inter, Arial, sans-serif;
    margin: 0;
    background: #0d0f14;
    color: #e6e6e6;
    display: flex;
    flex-direction: column; 
    align-items: center;
    padding: 40px 15px;
  }
  .container {
    width: 100%;
    max-width: 750px;
    background: #161a23;
    border-radius: 18px;
    padding: 30px 35px;
    box-shadow: 0 0 25px rgba(0,0,0,0.45);
    margin-bottom: 20px; 
  }
  h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #40c9ff;
    font-size: 28px;
    font-weight: 700;
  }
  .jump-box {
    text-align: center;
    margin-bottom: 20px;
  }
  .jump-box input {
    padding: 10px;
    width: 120px;
    border-radius: 10px;
    border: none;
    background: #222836;
    color: #fff;
    text-align: center;
  }
  .jump-box button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #40c9ff;
    color: #0d0f14;
    font-weight: 600;
    cursor: pointer;
    margin-left: 5px;
  }
  .question {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 18px;
    line-height: 1.4;
  }
  .options button {
    display: block;
    width: 100%;
    background: #222836;
    color: #e6e6e6;
    border: none;
    border-radius: 12px;
    padding: 12px;
    margin: 8px 0;
    text-align: left;
    font-size: 16px;
    cursor: pointer;
    transition: 0.25s;
  }
  .options button:hover {
    background: #2b3242;
  }
  .feedback {
    margin-top: 12px;
    font-size: 18px;
    font-weight: 600;
  }
  .correct {
    color: #4dff88;
  }
  .wrong {
    color: #ff5d5d;
  }
  .next-btn {
    margin-top: 20px;
    width: 100%;
    background: #40c9ff;
    color: #0d0f14;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    display: none;
  }
  .result {
    text-align: center;
  }
  /* --- FOOTER STYLES --- */
  #footer-reset-bar {
    width: 100%;
    max-width: 750px;
    text-align: center;
    padding: 15px 0;
  }
  #footer-reset-bar button {
    width: 100%;
    background: #272e3d;
    color: #d5d5d5;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s;
  }
  
  }
</style>
</head>
<body>
<div class="container">
  <h1>MF Topic 3 (31)</h1>

  <div class="jump-box">
    <input id="jumpInput" type="number" min="1" placeholder="Jump to #">
    <button onclick="jumpToQuestion()">Go</button>
  </div>

  <div id="quiz">
    <div id="question" class="question"></div>
    <div id="options" class="options"></div>
    <div id="feedback" class="feedback"></div>
    <button id="next-btn" class="next-btn">Next Question</button>
  </div>

  <div id="result" class="result" style="display:none;"></div>
</div>

<div id="footer-reset-bar">
  <button onclick="confirmReset()">🔄 Reset Quiz</button>
</div>
<script>
  const quizData = [
{
  q: "Which of the following is a group community-based credit and savings association composed of 25-50 low-income individuals?",
  options: ["Grameen Bank Model", "Village Banking", "Credit Union", "ASA Model"],
  answer: 1
},
{
  q: "In the Grameen Bank Model, how many members initially receive loans from a group of five?",
  options: ["One", "Two", "Three", "All five"],
  answer: 1
},
{
  q: "Which microfinance model emphasizes moral collateral instead of property?",
  options: ["Individual Model", "Village Banking", "Bank Guarantee", "Cooperatives"],
  answer: 1
},
{
  q: "Community banks are typically characterized by which of the following?",
  options: ["Owned by international investors", "Locally owned and operated", "Run by NGOs", "Focused only on agriculture"],
  answer: 1
},
{
  q: "Which microfinance model is a democratic, not-for-profit financial cooperative owned and governed by members?",
  options: ["Credit Union", "Association", "Bank Guarantee", "Individual Model"],
  answer: 0
},
{
  q: "Which of the following is an autonomous association of persons united voluntarily to meet common needs through a jointly owned enterprise?",
  options: ["Association", "Cooperative", "Credit Union", "Intermediary"],
  answer: 1
},
{
  q: "Which model involves forming an association through which savings and microfinance activities are initiated?",
  options: ["Association Model", "Group Model", "ASA Model", "Individual Model"],
  answer: 0
},
{
  q: "Bank Guarantees in microfinance are primarily used for which purpose?",
  options: ["Loan recovery and insurance claims", "Peer pressure enforcement", "Group lending", "Dividend distribution"],
  answer: 0
},
{
  q: "Which of the following acts as a third-party go-between organization between lenders and borrowers?",
  options: ["Association", "Intermediary", "Cooperative", "Individual Model"],
  answer: 1
},
{
  q: "Which microfinance model provides loans directly to individuals based on creditworthiness without group formation?",
  options: ["Group Model", "Individual Model", "ASA Model", "Village Banking"],
  answer: 1
},
{
  q: "In the Group Model, how is repayment ensured?",
  options: ["Collateral property", "Peer pressure and joint liability", "Government guarantee", "NGO monitoring"],
  answer: 1
},
{
  q: "NGOs in microfinance primarily act as which of the following?",
  options: ["Borrowers", "Intermediaries and advocates", "Commercial banks", "Credit unions"],
  answer: 1
},
{
  q: "Which model involves cyclical contributions to a common fund distributed as a lump sum to members in rotation?",
  options: ["ASA Model", "ROSCA Model", "Village Banking", "Individual Model"],
  answer: 1
},
{
  q: "The ASA Model is characterized by which of the following?",
  options: ["Group liability", "Individual liability with standardized systems", "Joint ownership of enterprises", "Rotating contributions"],
  answer: 1
},
{
  q: "CARD MRI began in 1986 as an NGO focused on which of the following?",
  options: ["Agriculture only", "Community development for health and education", "Insurance only", "Bank guarantees"],
  answer: 1
},
{
  q: "Which microfinance model adopted the individual liability approach of ASA since 2005?",
  options: ["Grameen Bank Model", "Village Banking", "CARD MRI Model", "Credit Union"],
  answer: 2
},
{
  q: "Which of the following microfinance models is most closely associated with Dr. Muhammad Yunus?",
  options: ["ASA Model", "Grameen Bank Model", "Village Banking", "CARD MRI Model"],
  answer: 1
},
{
  q: "Which model emphasizes environmental protection, children's education, and access to technology?",
  options: ["Community Banking", "Grameen Bank Model", "Individual Model", "Association"],
  answer: 1
},
{
  q: "In a Credit Union, surplus funds are returned to members in what form?",
  options: ["Dividends", "Collateral", "Guarantees", "Loans"],
  answer: 0
},
{
  q: "Which microfinance model is essentially a formalized version of informal financial systems like savings groups?",
  options: ["ROSCA Model", "Association Model", "Community Banking", "All of the above"],
  answer: 3
},
{
  q: "Which model requires weekly meetings where group members are jointly accountable for each other's loans?",
  options: ["Individual Model", "Group Model", "Bank Guarantee", "Intermediary"],
  answer: 1
},
{
  q: "Which of the following is NOT a feature of the ASA Model?",
  options: ["Individual liability", "Withdrawable savings", "Joint liability", "Standardized procedures"],
  answer: 2
},
{
  q: "Which microfinance model is most effective in building social capital through group formation and leadership development?",
  options: ["Grameen Bank Model", "Individual Model", "Bank Guarantee", "Intermediary"],
  answer: 0
},
{
  q: "Which model is based on rotating contributions where each member eventually receives a lump sum?",
  options: ["Village Banking", "ROSCA Model", "Credit Union", "Association"],
  answer: 1
},
{
  q: "Which microfinance model is run entirely by its members, who elect officers and establish by-laws?",
  options: ["Village Banking", "Individual Model", "ASA Model", "Intermediary"],
  answer: 0
},
{
  q: "Which of the following models is most standardized and easy to audit for fraud detection?",
  options: ["ASA Model", "Village Banking", "Credit Union", "Association"],
  answer: 0
},
{
  q: "Which model treats the entire community as one unit for microfinance delivery?",
  options: ["Community Banking", "Group Model", "Individual Model", "Association"],
  answer: 0
},
{
  q: "Which of the following is a variant of both Grameen Bank and ASA models?",
  options: ["Village Banking", "CARD MRI Model", "Credit Union", "Association"],
  answer: 1
},
{
  q: "Which microfinance model relies on solidarity guarantees and step credit?",
  options: ["Village Banking", "Individual Model", "ASA Model", "Intermediary"],
  answer: 0
},
{
  q: "Which of the following models is primarily used by low-income households excluded from formal banks?",
  options: ["Formal banks", "Microfinance models", "Insurance companies", "Government agencies"],
  answer: 1
}

  ];

  let currentQuestion = 0;
  let score = 0;
  let hasAnsweredCorrectly = new Array(quizData.length).fill(false);

  const questionEl = document.getElementById("question");
  const optionsEl = document.getElementById("options");
  const feedbackEl = document.getElementById("feedback");
  const nextBtn = document.getElementById("next-btn");
  const resultEl = document.getElementById("result");
  
  // *** NEW FUNCTION: Handles the confirmation dialog and reset ***
  function confirmReset() {
    const isConfirmed = confirm("Are you sure you want to reset the quiz? Your current progress will be lost.");
    
    if (isConfirmed) {
      location.reload(); // Hard reset (Yes clicked)
    } 
    // If 'Cancel' or 'No' is clicked, nothing happens.
  }
  // -------------------------------------------------------------

  function showQuestion() {
    const item = quizData[currentQuestion];
    questionEl.textContent = `Q${currentQuestion + 1}. ${item.q}`;
    optionsEl.innerHTML = "";
    feedbackEl.textContent = "";
    nextBtn.style.display = "none";

    item.options.forEach((opt, index) => {
      const btn = document.createElement("button");
      btn.textContent = opt;
      btn.onclick = () => tryAnswer(btn, index);
      optionsEl.appendChild(btn);
      
      if (hasAnsweredCorrectly[currentQuestion]) {
        btn.disabled = true;
      }
    });
    
    if (hasAnsweredCorrectly[currentQuestion]) {
        nextBtn.style.display = "block";
        feedbackEl.textContent = "✅ Correct! (Revisiting)";
        feedbackEl.className = "feedback correct";
    }
  }

  function tryAnswer(btn, selected) {
    const correct = quizData[currentQuestion].answer;

    if (selected === correct) {
      feedbackEl.textContent = "✅ Correct!";
      feedbackEl.className = "feedback correct";

      if (!hasAnsweredCorrectly[currentQuestion]) {
        score++;
        hasAnsweredCorrectly[currentQuestion] = true;
      }

      Array.from(optionsEl.children).forEach(b => b.disabled = true);
      nextBtn.style.display = "block";

    } else {
      btn.disabled = true;
      btn.style.opacity = "0.45";

      feedbackEl.textContent = "❌ Wrong! Try again.";
      feedbackEl.className = "feedback wrong";
    }
  }

  nextBtn.onclick = () => {
    currentQuestion++;
    if (currentQuestion < quizData.length) {
      showQuestion();
    } else {
      showResult();
    }
  };

  function jumpToQuestion() {
    const num = parseInt(document.getElementById("jumpInput").value);
    if (!num || num < 1 || num > quizData.length) {
      alert("Invalid question number.");
      return;
    }
    currentQuestion = num - 1;
    showQuestion();
  }

  function showResult() {
    document.getElementById("quiz").style.display = "none";
    resultEl.style.display = "block";

    resultEl.innerHTML = `
      <h2>Your Score: ${score}/${quizData.length}</h2>
    `;
  }

  showQuestion();
</script>
</body>
</html>
